function TweaksUI({ t, setTweak }) {
  return (
    <TweaksPanel>
      <TweakText id="headlineTop" label="Headline line 1" value={t.headlineTop} onChange={v => setTweak('headlineTop', v)} />
      <TweakText id="headlineBottom" label="Headline line 2" value={t.headlineBottom} onChange={v => setTweak('headlineBottom', v)} />
      <TweakText id="showDate" label="Show date" value={t.showDate} onChange={v => setTweak('showDate', v)} />
      <TweakText id="showTime" label="Show time" value={t.showTime} onChange={v => setTweak('showTime', v)} />
      <TweakText id="ticketPrice" label="Ticket price" value={t.ticketPrice} onChange={v => setTweak('ticketPrice', v)} />
      <TweakSlider id="seatsLeft" label="Seats left" min={1} max={60} step={1} value={t.seatsLeft} onChange={v => setTweak('seatsLeft', v)} />
      <TweakColor id="accentColor" label="Accent color" value={t.accentColor} onChange={v => setTweak('accentColor', v)} />
    </TweaksPanel>
  );
}
